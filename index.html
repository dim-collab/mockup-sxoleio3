<!-- README: School Blog Production Version (Firebase) -->
<!-- 1. Create Firebase project
2. Enable Authentication (Email/Password)
3. Enable Firestore Database
4. Enable Storage
5. Replace firebaseConfig below -->

<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σχολικό Blog</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

</head>
<body>

<header>
  <h1>📚 Σχολικό Blog</h1>
</header>

<section>
  <h2>Σύνδεση / Εγγραφή</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="student">Μαθητής</option>
    <option value="teacher">Καθηγητής</option>
  </select>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</section>

<section>
  <h2>Upload</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>

  <div id="gallery" class="grid"></div>
</section>

<section>
  <h2>Αναρτήσεις</h2>
  <textarea id="postText"></textarea>
  <button onclick="createPost()">Δημοσίευση</button>

  <div id="posts" class="grid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
