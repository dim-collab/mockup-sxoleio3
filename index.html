<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolHub</title>

<link rel="stylesheet" href="styles.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">SchoolHub</div>
  <nav>
    <a href="#">Αρχική</a>
    <a href="#gallery">Δραστηριότητες</a>
    <a href="#posts">Ανακοινώσεις</a>
    <a href="#auth">Σύνδεση</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Καλώς ήρθατε στο σχολικό μας portal</h1>
    <p>Μοιραστείτε στιγμές, εργασίες και δραστηριότητες</p>
  </div>
</section>

<!-- AUTH -->
<section id="auth" class="section">
  <h2>Σύνδεση</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <select id="role">
    <option value="student">Μαθητής</option>
    <option value="teacher">Καθηγητής</option>
  </select>
  <button onclick="login()">Login</button>
</section>

<!-- GALLERY -->
<section id="gallery" class="section">
  <h2>📸 Δραστηριότητες</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
  <div id="galleryGrid" class="grid"></div>
</section>

<!-- POSTS -->
<section id="posts" class="section">
  <h2>📝 Ανακοινώσεις</h2>
  <textarea id="postText"></textarea>
  <button onclick="createPost()">Δημοσίευση</button>
  <div id="postsGrid" class="grid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
